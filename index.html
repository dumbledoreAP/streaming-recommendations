<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What to Watch — Australia</title>
  <style>
    :root {
      --bg: #faf7f2;
      --card: #ffffff;
      --card-hover: #fffaf5;
      --text: #2d2218;
      --text-secondary: #6b5e4f;
      --border: #e8dfd3;
      --accent: #d4a853;
      --accent-light: #f5ecd7;
      --tag-bg: #f5f0e8;
      --tag-text: #7a6b4f;
      --imdb-bg: #f5f0e8;
      --imdb-text: #8b6914;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
      --shadow-hover: 0 2px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --radius: 14px;
      --radius-sm: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 24px 20px 64px; }

    header {
      text-align: center;
      padding: 40px 0 28px;
    }
    header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      margin-bottom: 4px;
    }
    header p {
      font-size: 16px;
      color: var(--text-secondary);
      font-weight: 400;
    }
    .last-updated {
      font-size: 13px;
      color: #b8a88a;
      margin-top: 6px;
    }

    .service-section { margin-top: 20px; }

    .service-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 8px;
    }
    .service-logo {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
      color: #fff;
    }
    .logo-netflix { background: #c0392b; }
    .logo-stan { background: #1769aa; }
    .logo-binge { background: #9b59b6; }
    .logo-disney { background: #1a5276; }
    .logo-prime { background: #2980b9; }
    .logo-apple { background: #2d2d2d; color: #f5f5f7; }

    .service-name {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: var(--text);
    }
    .service-count {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 400;
      margin-left: auto;
    }

    .card-list { display: flex; flex-direction: column; gap: 8px; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease, background 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid transparent;
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
      background: var(--card-hover);
      border-color: var(--border);
    }
    .card.watched {
      opacity: 0.55;
      text-decoration: line-through;
      text-decoration-color: #c4b99a;
      text-decoration-thickness: 1px;
    }

    .card-icon {
      font-size: 28px;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      background: var(--tag-bg);
      border-radius: 11px;
      flex-shrink: 0;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-title-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.15px;
      color: var(--text);
    }
    .card-type {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 2px 7px;
      border-radius: 4px;
      background: #f0e9d8;
      color: #8b7332;
    }
    .card-type.movie { background: #e8dfd3; color: #6b5e4f; }
    .card-type.doc { background: #dde8d5; color: #4a6741; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 3px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .card-genre {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      color: var(--tag-text);
      background: var(--tag-bg);
      padding: 1px 8px;
      border-radius: 20px;
      font-weight: 500;
    }

    .imdb-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #f7f0d9;
      color: #8b6914;
      font-size: 13px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      flex-shrink: 0;
      letter-spacing: -0.1px;
    }
    .imdb-star { font-size: 12px; }

    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* Watched section */
    .watched-section {
      margin-top: 28px;
    }
    .watched-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: #b8a88a;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.15px;
    }
    .watched-header .check-icon {
      font-size: 18px;
    }
    .watched-empty {
      text-align: center;
      padding: 16px;
      color: #c4b99a;
      font-size: 14px;
      font-style: italic;
    }
    .watched-byline {
      font-size: 12px;
      color: #c4b99a;
      margin-left: auto;
    }

    footer {
      text-align: center;
      padding: 32px 0 16px;
      font-size: 13px;
      color: #b8a88a;
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 520px) {
      .container { padding: 16px 12px 48px; }
      header { padding: 24px 0 20px; }
      header h1 { font-size: 26px; }
      .card { padding: 12px 14px; gap: 10px; }
      .card-icon { width: 36px; height: 36px; font-size: 24px; border-radius: 9px; }
      .card-title { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>What to Watch</h1>
      <p>Curated TV shows, documentaries, and movies in Australia</p>
      <div class="last-updated">Updated <span id="updated-date">June 2026</span></div>
    </header>

    <div id="services-container"></div>

    <div id="watched-container" class="watched-section"></div>

    <footer>
      <p>Made with ❤️ &nbsp;·&nbsp; <a href="https://github.com/dumbledoreAP/streaming-recommendations">GitHub</a></p>
    </footer>
  </div>

  <script>
    (async () => {
      const resp = await fetch('./data.json');
      const data = await resp.json();

      // Set date from data if present
      if (data.updated) {
        document.getElementById('updated-date').textContent = data.updated;
      }

      const servicesEl = document.getElementById('services-container');

      data.services.forEach((svc, idx) => {
        if (idx > 0) {
          const divider = document.createElement('div');
          divider.className = 'section-divider';
          servicesEl.appendChild(divider);
        }

        const section = document.createElement('section');
        section.className = 'service-section';
        section.id = svc.id;

        section.innerHTML = `
          <div class="service-header">
            <div class="service-logo ${svc.logoClass}">${svc.logo}</div>
            <span class="service-name">${svc.name}</span>
            <span class="service-count">${svc.shows.length} picks</span>
          </div>
          <div class="card-list">
            ${svc.shows.map(s => `
              <div class="card">
                <div class="card-icon">${s.icon}</div>
                <div class="card-body">
                  <div class="card-title-row">
                    <span class="card-title">${s.title}</span>
                    <span class="card-type ${s.type === 'movie' ? 'movie' : s.type === 'doc' ? 'doc' : ''}">${s.type}</span>
                  </div>
                  <div class="card-meta">
                    <span class="card-genre">${s.genre}</span>
                    <span>${s.seasons}</span>
                  </div>
                </div>
                <div class="imdb-badge"><span class="imdb-star">★</span> ${s.imdb.toFixed(1)}</div>
              </div>
            `).join('')}
          </div>
        `;

        servicesEl.appendChild(section);
      });

      // Watched section
      const watchedEl = document.getElementById('watched-container');
      if (data.watched && data.watched.length > 0) {
        watchedEl.innerHTML = `
          <div class="section-divider"></div>
          <div class="watched-header">
            <span class="check-icon">✅</span> Recently Watched
            <span class="watched-byline">${data.watched.length} cleared</span>
          </div>
          <div class="card-list">
            ${data.watched.map(s => `
              <div class="card watched">
                <div class="card-icon">${s.icon}</div>
                <div class="card-body">
                  <div class="card-title-row">
                    <span class="card-title">${s.title}</span>
                    <span class="card-type ${s.type === 'movie' ? 'movie' : s.type === 'doc' ? 'doc' : ''}">${s.type}</span>
                  </div>
                  <div class="card-meta">
                    <span class="card-genre">${s.genre}</span>
                    <span>${s.seasons}</span>
                  </div>
                </div>
                <div class="imdb-badge"><span class="imdb-star">★</span> ${s.imdb.toFixed(1)}</div>
              </div>
            `).join('')}
          </div>
        `;
      }
    })();
  </script>
</body>
</html>
